name: Clipstasher
options:
  bundleIdPrefix: com.shreyravi
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  Clipstasher:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Clipstasher
    dependencies:
      - package: GRDB
        product: GRDB
    info:
      path: Clipstasher/Info.plist
      properties:
        CFBundleDisplayName: Clipstasher
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026 Shreyas Tallamraju. MIT License."
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shreyravi.clipstasher
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"

  ClipstasherTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ClipstasherTests
    dependencies:
      - target: Clipstasher
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shreyravi.clipstasherTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
